<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hund Button</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #ffe6a7, #ffb703 35%, #fb8500 100%);
      color: #111;
      text-align: center;
      padding: 24px;
    }
    .card {
      width: min(420px, 100%);
      background: rgba(255, 255, 255, 0.82);
      border: 3px solid rgba(0,0,0,.12);
      border-radius: 28px;
      padding: 34px 26px;
      box-shadow: 0 24px 70px rgba(0,0,0,.22);
      backdrop-filter: blur(10px);
    }
    h1 { margin: 0 0 10px; font-size: clamp(34px, 8vw, 56px); }
    p { margin: 0 0 24px; font-size: 18px; opacity: .75; }
    button {
      border: 0;
      border-radius: 999px;
      padding: 17px 26px;
      font-size: 20px;
      font-weight: 800;
      color: white;
      background: linear-gradient(135deg, #111, #333);
      box-shadow: 0 12px 26px rgba(0,0,0,.25);
      cursor: pointer;
      transition: transform .12s ease, box-shadow .12s ease;
    }
    button:active { transform: scale(.96); box-shadow: 0 8px 18px rgba(0,0,0,.22); }
    .dog {
      margin-top: 26px;
      min-height: 130px;
      display: none;
      place-items: center;
      animation: pop .35s ease both;
    }
    .dog.show { display: grid; }
    .emoji { font-size: 76px; line-height: 1; }
    .message { margin-top: 10px; font-size: 28px; font-weight: 900; }
    @keyframes pop {
      from { opacity: 0; transform: translateY(18px) scale(.9); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Hund-Test</h1>
    <p>Klick den Button.</p>
    <button id="btn">Klick mich</button>
    <section id="dog" class="dog" aria-live="polite">
      <div>
        <div class="emoji">🐶</div>
        <div class="message">Manuel ist ein Hund.</div>
      </div>
    </section>
  </main>
  <script>
    const btn = document.getElementById('btn');
    const dog = document.getElementById('dog');
    btn.addEventListener('click', () => {
      dog.classList.remove('show');
      void dog.offsetWidth;
      dog.classList.add('show');
    });
  </script>
</body>
</html>
