<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Wer ist der grösste Hund?</title>
  <style>
    :root {
      --bg: #070715;
      --card: rgba(18, 18, 42, .72);
      --text: #fff8f0;
      --muted: rgba(255, 248, 240, .68);
      --pink: #ff3df2;
      --cyan: #34e7ff;
      --gold: #ffd166;
      --green: #70ff80;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow-x: hidden;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 10%, rgba(255, 61, 242, .34), transparent 30%),
        radial-gradient(circle at 78% 18%, rgba(52, 231, 255, .28), transparent 26%),
        radial-gradient(circle at 50% 95%, rgba(255, 209, 102, .24), transparent 36%),
        linear-gradient(135deg, #05050d 0%, #111132 48%, #05050d 100%);
      padding: 22px;
    }

    body::before {
      content: "";
      position: fixed;
      inset: -80px;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,.055) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.055) 1px, transparent 1px);
      background-size: 44px 44px;
      transform: perspective(700px) rotateX(62deg) translateY(16%);
      transform-origin: center bottom;
      opacity: .45;
      mask-image: linear-gradient(transparent, #000 30%, transparent 92%);
    }

    .confetti {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .confetti span {
      position: absolute;
      top: -14px;
      width: 8px;
      height: 16px;
      border-radius: 5px;
      background: var(--c);
      left: var(--x);
      animation: fall var(--d) linear infinite;
      animation-delay: var(--delay);
      opacity: .75;
    }

    @keyframes fall {
      to { transform: translateY(110vh) rotate(780deg); }
    }

    .arena {
      width: min(1040px, 100%);
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1.05fr .95fr;
      gap: 28px;
      align-items: center;
      padding: 30px;
      border: 1px solid rgba(255,255,255,.16);
      border-radius: 38px;
      background: linear-gradient(145deg, rgba(255,255,255,.12), rgba(255,255,255,.045));
      box-shadow: 0 30px 110px rgba(0,0,0,.56), inset 0 1px 0 rgba(255,255,255,.18);
      backdrop-filter: blur(20px);
    }

    .hero { padding: 8px 0 8px 8px; }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      padding: 10px 14px;
      border-radius: 999px;
      color: #071014;
      background: linear-gradient(90deg, var(--gold), #ff8ef8, var(--cyan));
      font-weight: 950;
      letter-spacing: .05em;
      text-transform: uppercase;
      font-size: 12px;
      box-shadow: 0 0 32px rgba(255,61,242,.35);
    }

    h1 {
      margin: 22px 0 12px;
      font-size: clamp(46px, 8vw, 92px);
      line-height: .86;
      letter-spacing: -.08em;
    }

    .gradient {
      display: block;
      background: linear-gradient(90deg, #fff, var(--gold), var(--pink), var(--cyan));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: none;
    }

    .sub {
      margin: 0;
      max-width: 560px;
      color: var(--muted);
      font-size: clamp(17px, 2.2vw, 23px);
      line-height: 1.45;
    }

    .scoreboard {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 26px;
    }

    .dog-card {
      padding: 13px 10px;
      border-radius: 20px;
      background: rgba(255,255,255,.09);
      border: 1px solid rgba(255,255,255,.13);
      text-align: center;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.12);
    }

    .dog-card b { display:block; font-size: 16px; }
    .dog-card small { color: var(--muted); }

    .game {
      display: grid;
      place-items: center;
      gap: 18px;
    }

    .wheel-wrap {
      position: relative;
      width: min(420px, 80vw);
      aspect-ratio: 1;
      display: grid;
      place-items: center;
    }

    .pointer {
      position: absolute;
      top: -4px;
      z-index: 4;
      width: 0;
      height: 0;
      border-left: 22px solid transparent;
      border-right: 22px solid transparent;
      border-top: 48px solid #fff;
      filter: drop-shadow(0 8px 10px rgba(0,0,0,.45));
    }

    .wheel {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      position: relative;
      overflow: hidden;
      border: 11px solid rgba(255,255,255,.9);
      box-shadow: 0 0 0 10px rgba(255,255,255,.08), 0 28px 80px rgba(0,0,0,.55), 0 0 70px rgba(52,231,255,.28);
      background: conic-gradient(from -60deg,
        #ff3df2 0deg 120deg,
        #34e7ff 120deg 240deg,
        #ffd166 240deg 360deg);
      transform: rotate(0deg);
      transition: transform 4.2s cubic-bezier(.09,.72,.11,1);
    }

    .wheel::after {
      content: "🐶";
      position: absolute;
      inset: 50%;
      width: 92px;
      height: 92px;
      margin: -46px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: #070715;
      border: 6px solid #fff;
      font-size: 48px;
      box-shadow: 0 0 36px rgba(0,0,0,.45);
    }

    .slice {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: start center;
      padding-top: 34px;
      font-weight: 1000;
      font-size: clamp(18px, 4.5vw, 32px);
      color: #08080e;
      text-transform: uppercase;
      letter-spacing: -.03em;
      text-shadow: 0 1px 0 rgba(255,255,255,.45);
    }

    .slice span {
      display: inline-block;
      padding: 8px 13px;
      border-radius: 999px;
      background: rgba(255,255,255,.62);
      border: 1px solid rgba(255,255,255,.55);
    }

    .slice.timon { transform: rotate(0deg); }
    .slice.emanuele { transform: rotate(120deg); }
    .slice.kilian { transform: rotate(240deg); }
    .slice.timon span { transform: rotate(0deg); }
    .slice.emanuele span { transform: rotate(-120deg); }
    .slice.kilian span { transform: rotate(-240deg); }

    .button-row {
      width: min(420px, 100%);
      display: grid;
      gap: 12px;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 18px 24px;
      font-size: 20px;
      font-weight: 1000;
      color: #071014;
      background: linear-gradient(90deg, var(--gold), var(--green), var(--cyan), var(--pink));
      box-shadow: 0 18px 50px rgba(255,61,242,.28), 0 0 0 1px rgba(255,255,255,.35) inset;
      cursor: pointer;
      transition: transform .14s ease, filter .14s ease;
    }

    button:hover { transform: translateY(-2px) scale(1.01); filter: saturate(1.25); }
    button:active { transform: scale(.97); }
    button:disabled { cursor: wait; opacity: .72; }

    .result {
      min-height: 92px;
      padding: 20px;
      border-radius: 26px;
      text-align: center;
      background: rgba(0,0,0,.32);
      border: 1px solid rgba(255,255,255,.15);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.12);
    }

    .result .label {
      color: var(--muted);
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: .12em;
      font-weight: 900;
    }

    .result .winner {
      margin-top: 5px;
      font-size: clamp(28px, 6vw, 48px);
      font-weight: 1000;
      line-height: 1;
    }

    .shake { animation: shake .55s ease both; }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20% { transform: translateX(-7px) rotate(-1deg); }
      40% { transform: translateX(7px) rotate(1deg); }
      60% { transform: translateX(-4px) rotate(-.6deg); }
      80% { transform: translateX(4px) rotate(.6deg); }
    }

    .glow {
      animation: glow 1.2s ease-in-out infinite alternate;
    }
    @keyframes glow {
      from { text-shadow: 0 0 10px rgba(255,255,255,.4), 0 0 24px rgba(255,61,242,.5); }
      to { text-shadow: 0 0 18px rgba(255,255,255,.85), 0 0 44px rgba(52,231,255,.75); }
    }

    @media (max-width: 820px) {
      .arena { grid-template-columns: 1fr; padding: 20px; border-radius: 28px; }
      .hero { text-align: center; padding: 0; }
      .sub { margin: 0 auto; }
      .scoreboard { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="confetti" aria-hidden="true">
    <span style="--x:7%;--c:#ff3df2;--d:7s;--delay:-1s"></span>
    <span style="--x:18%;--c:#34e7ff;--d:9s;--delay:-5s"></span>
    <span style="--x:31%;--c:#ffd166;--d:8s;--delay:-3s"></span>
    <span style="--x:47%;--c:#70ff80;--d:10s;--delay:-7s"></span>
    <span style="--x:63%;--c:#ff3df2;--d:7.8s;--delay:-4s"></span>
    <span style="--x:78%;--c:#34e7ff;--d:8.4s;--delay:-2s"></span>
    <span style="--x:91%;--c:#ffd166;--d:9.5s;--delay:-6s"></span>
  </div>

  <main class="arena">
    <section class="hero">
      <div class="badge">🏆 Offizielle Hund-Olympiade</div>
      <h1>Wer ist der <span class="gradient">grösste Hund?</span></h1>
      <p class="sub">Drei Kandidaten. Ein radloses Schicksal. Klick auf Spin und lass das Hunde-Orakel entscheiden.</p>
      <div class="scoreboard" aria-label="Kandidaten">
        <div class="dog-card"><b>Timon</b><small>Wuff-Level: gefährlich</small></div>
        <div class="dog-card"><b>Emanuele</b><small>Bell-Faktor: maximal</small></div>
        <div class="dog-card"><b>Kilian</b><small>Hundemodus: verdächtig</small></div>
      </div>
    </section>

    <section class="game" aria-label="Spin-Spiel">
      <div class="wheel-wrap">
        <div class="pointer" aria-hidden="true"></div>
        <div id="wheel" class="wheel">
          <div class="slice timon"><span>Timon</span></div>
          <div class="slice emanuele"><span>Emanuele</span></div>
          <div class="slice kilian"><span>Kilian</span></div>
        </div>
      </div>

      <div class="button-row">
        <button id="spin">SPIN 🐕</button>
        <div id="result" class="result" aria-live="polite">
          <div class="label">Noch kein Urteil</div>
          <div class="winner">Bereit?</div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const wheel = document.getElementById('wheel');
    const spin = document.getElementById('spin');
    const result = document.getElementById('result');

    const candidates = [
      { name: 'Timon', angle: 300, roast: 'bellt offiziell am lautesten' },
      { name: 'Emanuele', angle: 180, roast: 'hat den Premium-Wuff aktiviert' },
      { name: 'Kilian', angle: 60, roast: 'ist heute im Hunde-Endboss-Modus' }
    ];

    let rotation = 0;
    let drawBag = [];
    let lastWinner = null;

    function randomInt(max) {
      const values = new Uint32Array(1);
      crypto.getRandomValues(values);
      return values[0] % max;
    }

    function shuffle(items) {
      const copy = [...items];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = randomInt(i + 1);
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function refillBag() {
      drawBag = shuffle(candidates);
      if (lastWinner && drawBag[0].name === lastWinner.name) {
        drawBag.push(drawBag.shift());
      }
    }

    function pickWinner() {
      if (drawBag.length === 0) refillBag();
      const winner = drawBag.shift();
      lastWinner = winner;
      return winner;
    }

    spin.addEventListener('click', () => {
      const winner = pickWinner();
      spin.disabled = true;
      spin.textContent = 'Spinnt... 🌀';
      result.classList.remove('shake');
      result.innerHTML = '<div class="label">Das Orakel denkt nach</div><div class="winner">Wuff wuff...</div>';

      const currentAngle = ((rotation % 360) + 360) % 360;
      const tinyJitter = randomInt(27) - 13;
      const targetAngle = winner.angle + tinyJitter;
      let delta = (targetAngle - currentAngle + 360) % 360;
      if (delta < 80) delta += 360;
      const fullSpins = 6 + randomInt(4);
      rotation += fullSpins * 360 + delta;
      wheel.style.transform = `rotate(${rotation}deg)`;

      window.setTimeout(() => {
        result.innerHTML = `<div class="label">Der grösste Hund ist</div><div class="winner glow">${winner.name} 🐶</div><div class="label">${winner.roast}</div>`;
        result.classList.add('shake');
        spin.disabled = false;
        spin.textContent = 'NOCHMAL SPINNEN 🐕';
      }, 4300);
    });
  </script>
</body>
</html>
